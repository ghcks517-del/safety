<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경: 주황색 -->
  <rect width="512" height="512" rx="100" fill="#f97316"/>
  
  <!-- 계산기 아이콘 (중앙) -->
  <g transform="translate(156, 100)">
    <!-- 계산기 본체 -->
    <rect width="200" height="260" rx="20" fill="#ffffff" stroke="#1e293b" stroke-width="12"/>
    <!-- 계산기 화면 -->
    <rect x="30" y="30" width="140" height="50" rx="8" fill="#cbd5e1"/>
    <!-- 계산기 버튼들 -->
    <rect x="35" y="100" width="35" height="35" rx="6" fill="#4f46e5"/>
    <rect x="82" y="100" width="35" height="35" rx="6" fill="#4f46e5"/>
    <rect x="130" y="100" width="35" height="35" rx="6" fill="#4f46e5"/>
    
    <rect x="35" y="150" width="35" height="35" rx="6" fill="#4f46e5"/>
    <rect x="82" y="150" width="35" height="35" rx="6" fill="#4f46e5"/>
    <rect x="130" y="150" width="35" height="35" rx="6" fill="#4f46e5"/>
    
    <rect x="35" y="200" width="35" height="35" rx="6" fill="#4f46e5"/>
    <rect x="82" y="200" width="35" height="35" rx="6" fill="#4f46e5"/>
    <rect x="130" y="200" width="35" height="35" rx="6" fill="#f43f5e"/>
  </g>
  
  <!-- "Safety" 텍스트 (중앙 그림 바로 아래) -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="white" text-anchor="middle">Safety</text>
</svg>
